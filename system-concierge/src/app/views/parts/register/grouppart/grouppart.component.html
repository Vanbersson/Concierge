<div class="layout-card">
    <p-toast />
    <div class="layout-card-title">
        <span>Grupos de peças</span>
        <p-button icon="pi pi-plus" [text]="true" label="Novo" (onClick)="showNewGroup()" />
    </div>
    <p-table #tableModel [value]="listGroups"
        currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} Cadastros"
        [globalFilterFields]="['id','status','type','description']" [paginator]="true" [rows]="10"
        [rowsPerPageOptions]="[10, 25, 50]" styleClass="p-datatable-sm">
        <ng-template pTemplate="caption">
            <div class="flex justify-content-between">
                <p-iconField iconPosition="left">
                    <p-inputIcon>
                        <i class="pi pi-search"></i>
                    </p-inputIcon>
                    <input pInputText type="text" (input)="tableModel.filterGlobal($event.target.value, 'contains')"
                        placeholder="Pesquisar" />
                </p-iconField>
            </div>
        </ng-template>
        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="id" style="width:10%">Código <p-sortIcon field="id"></p-sortIcon></th>
                <th pSortableColumn="status" style="width:10%">Status <p-sortIcon field="status"></p-sortIcon></th>
                <th pSortableColumn="type" style="width:10%">Tipo<p-sortIcon field="type"></p-sortIcon></th>
                <th pSortableColumn="description" style="width:10%">Grupo<p-sortIcon field="description"></p-sortIcon>
                    <th pSortableColumn="brandId" style="width:60%">Marca<p-sortIcon field="brandId"></p-sortIcon>
                </th>
                <th></th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-group>
            <tr>
                <td>{{group.id}}</td>
                <td>
                    <i class="pi " [ngClass]="{
                        'pi-times-circle text-red-500':group.status == disabled,
                        'pi-check-circle text-green-500':group.status == enabled}">
                    </i> {{group.status | uppercase}}
                </td>
                <td>{{group.type | uppercase}}</td>
                <td>{{group.description | uppercase}}</td>
                 <td>{{ searchBrand(group.brandId) | uppercase}}</td>
                <td>
                    <p-button icon="pi pi-pencil" label="Editar" [text]="true" severity="secondary-custom" size="small"
                        (onClick)="edit(group)" />
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>

<p-dialog header="Cadastro da Unidades de Medida" [(visible)]="dialogVisible" [modal]="true" [style]="{width: '600px'}"
    [breakpoints]="{ '1199px': '75vw', '575px': '90vw' }">
    <form [formGroup]="formGroup" (ngSubmit)="save()">
        <div class="p-fluid p-formgrid grid">
            <div class="col-12">
                <label for="brandid">Marca</label>
                <p-dropdown [options]="brands" optionLabel="name" [style]="{'text-transform':'uppercase'}" formControlName="brand"/>
                <!--  <small class="p-error block" *ngIf="formVehicle.get('modelVehicle')?.invalid">Campo obrigatório</small> -->
            </div>
            <div class="field col-12">
                <label for="nameId">Descrição</label>
                <input pInputText id="nameId" formControlName="description" maxlength="100" />
                <small class="p-error block" *ngIf="formGroup.get('description')?.invalid">Campo obrigatório</small>
            </div>
            
            <div class="field col-12">
                <span>Tipo</span>
                <div class="flex align-items-center gap-2 border-1 border-round border-300 p-3">                    
                    <div class="flex align-items-center">
                        <p-radioButton inputId="pId" [value]="pecas" formControlName="type"></p-radioButton>
                        <label for="pId" class="ml-2">{{pecas}}</label>
                    </div>
                    <div class="flex align-items-center">
                        <p-radioButton inputId="aId" [value]="acessorio" formControlName="type"></p-radioButton>
                        <label for="aId" class="ml-2">{{acessorio}}</label>
                    </div>
                    <div class="flex align-items-center">
                        <p-radioButton inputId="lId" [value]="lubrificates" formControlName="type"></p-radioButton>
                        <label for="lId" class="ml-2">{{lubrificates}}</label>
                    </div>
                    <div class="flex align-items-center">
                        <p-radioButton inputId="cId" [value]="combustiveis" formControlName="type"></p-radioButton>
                        <label for="cId" class="ml-2">{{combustiveis}}</label>
                    </div>
                    <div class="flex align-items-center">
                        <p-radioButton inputId="oId" [value]="outros" formControlName="type"></p-radioButton>
                        <label for="oId" class="ml-2">{{outros}}</label>
                    </div>
                </div>
            </div>

            <div class="field col-12 layout-card-status">
                <span>Status</span>
                <div class="flex align-items-center">
                    <p-radioButton inputId="enabledId" [value]="enabled" formControlName="status"></p-radioButton>
                    <label for="enabledId" class="ml-2">{{enabled}}</label>
                </div>
                <div class="flex align-items-center">
                    <p-radioButton inputId="disabledId" [value]="disabled" formControlName="status"></p-radioButton>
                    <label for="disabledId" class="ml-2">{{disabled}}</label>
                </div>
            </div>
        </div>
        <div class="flex justify-content-end gap-2 mt-3">
            <button pButton type="button" pRipple label="Fechar" icon="pi pi-times" class="p-button-text"
                (click)="hideDialog()"></button>
            <button pButton type="submit" pRipple label="Salvar" icon="pi pi-check" class="p-button-text"></button>
        </div>
    </form>
</p-dialog>
